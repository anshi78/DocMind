services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: documind_postgres
    environment:
      POSTGRES_USER: documind
      POSTGRES_PASSWORD: documind_local
      POSTGRES_DB: documind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U documind -d documind"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: documind_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../
      dockerfile: Dockerfile.backend
    container_name: documind_backend
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - SECRET_KEY=prod-secret-key-change-this-in-production-32chars
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=documind
      - POSTGRES_PASSWORD=documind_local
      - POSTGRES_DB=documind
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_BACKEND=local
      - STORAGE_LOCAL_PATH=/app/data/uploads
      - CORS_ORIGINS=["http://localhost:3000"]
      # Add API keys here (or load from local .env)
      - OPENAI_API_KEY=
      - GEMINI_API_KEY=
      - DEFAULT_EMBEDDING_PROVIDER=openai
      - DEFAULT_LLM_PROVIDER=openai
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../
      dockerfile: Dockerfile.worker
    container_name: documind_worker
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - SECRET_KEY=prod-secret-key-change-this-in-production-32chars
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=documind
      - POSTGRES_PASSWORD=documind_local
      - POSTGRES_DB=documind
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_BACKEND=local
      - STORAGE_LOCAL_PATH=/app/data/uploads
      - OPENAI_API_KEY=
      - GEMINI_API_KEY=
    volumes:
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../
      dockerfile: Dockerfile.frontend
    container_name: documind_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  backend_data:

networks:
  default:
    name: documind_network
