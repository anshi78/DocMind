# render.yaml (Render Blueprint Spec)
# Deploys DocuMind full stack (FastAPI backend, Worker, Next.js frontend, Postgres, and Redis)

services:
  # 1. FastAPI Backend (Web Service)
  - type: web
    name: documind-backend
    env: docker
    dockerfilePath: Dockerfile.backend
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: documind-db
          property: connectionString
      - key: REDIS_URL
        sync: false # Prompt for Upstash REDIS_URL on setup
      - key: DEFAULT_EMBEDDING_PROVIDER
        value: gemini
      - key: DEFAULT_LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false # Render will prompt you to enter this API key on setup
      - key: CORS_ORIGINS
        value: "*" # Update this with your frontend URL later for security
      - key: ALLOWED_HOSTS
        value: "*"

  # 2. ARQ Background Ingestion Worker (Background Worker)
  - type: worker
    name: documind-worker
    env: docker
    dockerfilePath: Dockerfile.worker
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: documind-db
          property: connectionString
      - key: REDIS_URL
        sync: false # Prompt for Upstash REDIS_URL on setup
      - key: DEFAULT_EMBEDDING_PROVIDER
        value: gemini
      - key: DEFAULT_LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false

  # 3. Next.js Frontend (Web Service)
  - type: web
    name: documind-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false

  # 4. Redis Cache & Queue (Key Value Store)
  # We are using a free Upstash Redis instance instead of Render's paid Redis.

# 5. Managed PostgreSQL Database
databases:
  - name: documind-db
    plan: free # Render Free tier expires in 90 days. Switch to Starter for production.
    databaseName: documind
    user: documind
